<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="The official Boitex Info app.">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="boitex_info_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>BoitexInfo</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* ========================================== */
    /* 1. BASE SYSTEM & 4K CANVAS                 */
    /* ========================================== */
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #030305; /* Pitch black OLED background */
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ========================================== */
    /* 2. NEXT-GEN AURORA MESH GRADIENT           */
    /* ========================================== */
    .aurora-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
      overflow: hidden;
      background: #030305;
    }

    .aurora {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px); /* Massive smooth blur */
      opacity: 0.8;
      mix-blend-mode: screen;
      animation: fluid-rotate 20s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
    }

    .aurora-1 {
      top: -20%; left: -10%;
      width: 60vw; height: 60vw;
      background: radial-gradient(circle, #5e1fb7 0%, transparent 70%);
      animation-delay: 0s;
    }

    .aurora-2 {
      bottom: -20%; right: -20%;
      width: 70vw; height: 70vw;
      background: radial-gradient(circle, #ec4899 0%, transparent 70%);
      animation-delay: -5s;
    }

    .aurora-3 {
      top: 30%; left: 40%;
      width: 55vw; height: 55vw;
      background: radial-gradient(circle, #0ea5e9 0%, transparent 70%);
      animation-delay: -10s;
    }

    .aurora-4 {
      bottom: 10%; left: -10%;
      width: 50vw; height: 50vw;
      background: radial-gradient(circle, #8b5cf6 0%, transparent 70%);
      animation-delay: -15s;
    }

    /* ========================================== */
    /* 3. PREMIUM HYPER-GLASS CARD                */
    /* ========================================== */
    #splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 1s cubic-bezier(0.25, 1, 0.5, 1);
      perspective: 1000px;
    }

    .premium-glass-card {
      position: relative;
      /* Ultra-Glassmorphism values */
      background: rgba(255, 255, 255, 0.015);
      backdrop-filter: blur(60px) saturate(160%);
      -webkit-backdrop-filter: blur(60px) saturate(160%);

      /* Apple-style physical glass edges */
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-top: 1px solid rgba(255, 255, 255, 0.2);
      border-left: 1px solid rgba(255, 255, 255, 0.15);

      /* Deep multidimensional shadow */
      box-shadow:
        0 40px 80px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.1),
        inset 0 0 20px rgba(255, 255, 255, 0.02);

      /* "Squircle" border radius */
      border-radius: 44px;
      padding: 60px 40px 50px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;

      /* Adaptable scaling for Mobile and 4K Web */
      width: 85%;
      max-width: 360px;

      /* Smooth Entrance */
      animation: card-appear 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* ========================================== */
    /* 4. LOGO & TYPOGRAPHY                       */
    /* ========================================== */
    .logo-container {
      position: relative;
      margin-bottom: 45px;
    }

    .premium-glass-card img {
      width: 150px;
      height: auto;
      filter: drop-shadow(0 20px 30px rgba(0,0,0,0.4));
      animation: float 6s ease-in-out infinite;
      position: relative;
      z-index: 2;
    }

    /* Shimmering Text */
    .shimmer-text {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 20px;

      /* Dynamic Gradient Apple-style text */
      background: linear-gradient(90deg, rgba(255,255,255,0.3) 0%, rgba(255,255,255,1) 50%, rgba(255,255,255,0.3) 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: text-shine 3s linear infinite;
    }

    /* ========================================== */
    /* 5. MODERN PROGRESS BAR                     */
    /* ========================================== */
    .loader-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    .sleek-progress-bar {
      width: 160px;
      height: 3px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }

    .progress-glow {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 40%;
      background: #ffffff;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(255,255,255,0.8);
      animation: loading-bar 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    /* ========================================== */
    /* 6. KEYFRAME ANIMATIONS                     */
    /* ========================================== */
    @keyframes fluid-rotate {
      0% { transform: rotate(0deg) scale(1) translate(0, 0); }
      50% { transform: rotate(180deg) scale(1.2) translate(5%, 10%); }
      100% { transform: rotate(360deg) scale(1) translate(-5%, -5%); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    @keyframes text-shine {
      to { background-position: 200% center; }
    }

    @keyframes loading-bar {
      0% { left: -40%; width: 30%; }
      50% { left: 20%; width: 80%; }
      100% { left: 100%; width: 30%; }
    }

    @keyframes card-appear {
      0% {
        opacity: 0;
        transform: translateY(40px) scale(0.9) rotateX(10deg);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1) rotateX(0deg);
      }
    }
  </style>
</head>
<body>

<div class="aurora-bg">
  <div class="aurora aurora-1"></div>
  <div class="aurora aurora-2"></div>
  <div class="aurora aurora-3"></div>
  <div class="aurora aurora-4"></div>
</div>

<div id="splash-screen">
  <div class="premium-glass-card">
    <div class="logo-container">
      <img src="assets/assets/images/logo.png" alt="Boitex Info Logo">
    </div>

    <div class="loader-container">
      <div class="shimmer-text">Boitex Workspace</div>
      <div class="sleek-progress-bar">
        <div class="progress-glow"></div>
      </div>
    </div>
  </div>
</div>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      // Keep your exact Firebase registration logic
      navigator.serviceWorker.register('firebase-messaging-sw.js')
        .then(function(registration) {
          console.log('✅ Service Worker pre-registered with scope:', registration.scope);
        }, function(err) {
          console.error('❌ Service Worker pre-registration failed:', err);
        });
    });
  }

  // Fade out smoothly when Flutter is ready
  window.addEventListener('flutter-first-frame', function() {
    var splash = document.getElementById('splash-screen');
    var ambient = document.querySelector('.aurora-bg');
    if (splash && ambient) {
      // Trigger the CSS transition
      splash.style.opacity = '0';
      ambient.style.opacity = '0';

      // Remove elements from DOM after transition finishes (1 second)
      setTimeout(function() {
        splash.remove();
        ambient.remove();
      }, 1000);
    }
  });
</script>

<script src="flutter_bootstrap.js" async></script>
</body>
</html>
