<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="The official Boitex Info app.">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="boitex_info_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>BoitexInfo</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Reset and Base Font setup (Apple System Font) */
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #0f172a; /* Deep elegant dark background */
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden; /* Prevent scrolling during load */
    }

    /* 1. Dynamic Colorful Ambient Background */
    .ambient-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
      overflow: hidden;
      background: #0f172a;
    }

    /* Colorful moving orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px); /* Massive blur for the ambient effect */
      opacity: 0.7;
      animation: drift 15s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
    }

    .orb-1 {
      top: -10%; left: -10%;
      width: 50vw; height: 50vw;
      background: #4f46e5; /* Deep Blue/Purple */
      animation-delay: 0s;
    }

    .orb-2 {
      bottom: -20%; right: -10%;
      width: 60vw; height: 60vw;
      background: #c026d3; /* Vibrant Fuchsia */
      animation-delay: -5s; /* Start halfway through animation */
    }

    .orb-3 {
      top: 40%; left: 30%;
      width: 45vw; height: 45vw;
      background: #0ea5e9; /* Cyan/Light Blue */
      animation-delay: -10s;
    }

    /* 2. The Splash Screen Container */
    #splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.8s cubic-bezier(0.25, 1, 0.5, 1); /* Smooth exit */
    }

    /* 3. The Frosted Glass Card */
    .glass-card {
      /* The core glassmorphism effect */
      background: rgba(255, 255, 255, 0.03); /* Barely visible white */
      backdrop-filter: blur(24px); /* Blur the elements behind it */
      -webkit-backdrop-filter: blur(24px); /* Safari support */

      /* Subtle borders and shadow for depth */
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-top: 1px solid rgba(255, 255, 255, 0.2);
      border-left: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);

      /* Card shaping and layout */
      border-radius: 32px;
      padding: 60px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;

      /* Responsive sizing: Looks great on Web and Mobile */
      width: 85%;
      max-width: 340px;

      /* Entrance animation */
      animation: card-appear 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    /* Logo Image Styling */
    .glass-card img {
      width: 160px;
      height: auto;
      margin-bottom: 35px;
      filter: drop-shadow(0 15px 25px rgba(0,0,0,0.3)); /* Shadow strictly on the logo */
      animation: float 6s ease-in-out infinite; /* Gentle floating */
    }

    /* Sleek Loading Typography */
    .loading-text {
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      /* Animated gradient text (Apple style) */
      background: linear-gradient(90deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,1) 50%, rgba(255,255,255,0.4) 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: text-shine 3s linear infinite;
    }

    /* ========================================== */
    /* KEYFRAME ANIMATIONS                        */
    /* ========================================== */

    @keyframes drift {
      0% { transform: translate(0px, 0px) scale(1); }
      100% { transform: translate(40px, -60px) scale(1.15); }
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
      100% { transform: translateY(0px); }
    }

    @keyframes text-shine {
      to { background-position: 200% center; }
    }

    @keyframes card-appear {
      0% { opacity: 0; transform: translateY(30px) scale(0.95); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
  </style>
</head>
<body>

<div class="ambient-bg">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<div id="splash-screen">
  <div class="glass-card">
    <img src="assets/assets/images/logo.png" alt="Boitex Info Logo">
    <div class="loading-text">Loading Workspace</div>
  </div>
</div>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      // We explicitly register the SW here to ensure it's ACTIVE before Flutter asks for a token
      navigator.serviceWorker.register('firebase-messaging-sw.js')
        .then(function(registration) {
          console.log('✅ Service Worker pre-registered with scope:', registration.scope);
        }, function(err) {
          console.error('❌ Service Worker pre-registration failed:', err);
        });
    });
  }

  // Fade out and remove the Splash Screen when Flutter renders the first frame
  window.addEventListener('flutter-first-frame', function() {
    var splash = document.getElementById('splash-screen');
    var ambient = document.querySelector('.ambient-bg');
    if (splash && ambient) {
      splash.style.opacity = '0';
      ambient.style.opacity = '0';
      setTimeout(function() {
        splash.remove();
        ambient.remove();
      }, 800); // Matches the 0.8s transition time in CSS
    }
  });
</script>

<script src="flutter_bootstrap.js" async></script>
</body>
</html>
